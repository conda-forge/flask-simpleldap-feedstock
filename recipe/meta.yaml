{% set name = "Flask-SimpleLDAP" %}
{% set version = "2.1.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') | lower }}-{{ version }}.tar.gz"
  sha256: 1359a5e48a70700077a3960994a8ab173ab8bf1ca9e814e6ef6510e108deb085

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv"
  noarch: python

requirements:
  host:
    - pip
    - setuptools
    - python {{ python_min }}
  run:
    - flask >=2.2.5
    - python >={{ python_min }}
    - python-ldap >=3.0.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - flask_simpleldap

about:
  home: https://github.com/admiralobvious/flask-simpleldap
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "LDAP authentication extension for Flask"
  doc_url: http://flask-simpleldap.readthedocs.org/en/latest/

extra:
  recipe-maintainers:
    - tschoonj
